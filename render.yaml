services:
  - type: web
    name: bigsmokestyle-api
    runtime: node
    plan: starter
    branch: developers
    rootDir: backend
    buildCommand: npm ci && npx prisma generate
    preDeployCommand: npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_URL
        value: https://bigsmokestyle-api.onrender.com
      - key: SITE_URL
        value: https://bigsmokestyle.onrender.com
      - key: STORE_URL
        value: https://bigsmokestyle.onrender.com
      - key: FRONTEND_URL
        value: https://bigsmokestyle.onrender.com
      - key: ADMIN_URL
        value: https://bigsmokestyle-admin.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://bigsmokestyle.onrender.com,https://bigsmokestyle-admin.onrender.com,https://bigsmokestyle.vercel.app,https://bigsmokestyle-admin.vercel.app
      - key: ABACATEPAY_API_URL
        value: https://api.abacatepay.com/v2
      - key: ABACATEPAY_BASE_URL
        value: https://api.abacatepay.com/v2
      - key: ABACATEPAY_CARD_MAX_INSTALLMENTS
        value: "6"
      - key: STORE_CITY
        value: Joao Pessoa
      - key: STORE_STATE
        value: PB
      - key: STORE_ORIGIN_CEP
        value: "58000000"
      - key: WHATSAPP_NUMBER
        value: "5583986494691"
      - key: SUPABASE_BUCKET
        value: product-images
      - key: SUPABASE_PRODUCTS_TABLE
        value: products
      - key: SUPABASE_ORDERS_TABLE
        value: orders
      - key: TWILIO_CUSTOMER_CONFIRMATION_ENABLED
        value: "false"
      - key: STRIPE_MOCK
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ABACATEPAY_API_KEY
        sync: false
      - key: ABACATEPAY_WEBHOOK_SECRET
        sync: false

  - type: web
    name: bigsmokestyle
    runtime: static
    branch: developers
    rootDir: frontend-loja
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_BASE_PATH
        value: /
      - key: VITE_API_URL
        value: https://bigsmokestyle-api.onrender.com
      - key: VITE_WHATSAPP_NUMBER
        value: "5583986494691"
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
    routes:
      - type: redirect
        source: /loja
        destination: /
      - type: redirect
        source: /loja/
        destination: /
      - type: redirect
        source: /loja/produto.html
        destination: /src/produto.html
      - type: redirect
        source: /loja/pedidos.html
        destination: /src/pedidos.html
      - type: redirect
        source: /loja/perfil.html
        destination: /src/perfil.html
      - type: redirect
        source: /loja/politica.html
        destination: /src/politica.html
      - type: redirect
        source: /loja/*
        destination: /*
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: bigsmokestyle-admin
    runtime: static
    branch: developers
    rootDir: frontend-admin
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_BASE_PATH
        value: /
      - key: VITE_API_URL
        value: https://bigsmokestyle-api.onrender.com
      - key: VITE_STORE_URL
        value: https://bigsmokestyle.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
