services:
  - type: web
    name: bigsmoke-backend
    runtime: node
    plan: free
    branch: main
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: FRONTEND_URL
        value: https://bigsmokestyle.vercel.app
      - key: ADMIN_URL
        value: https://bigsmokestyle-admin.vercel.app
      - key: PUBLIC_BACKEND_URL
        sync: false
      - key: SITE_URL
        value: https://bigsmokestyle.vercel.app
      - key: STORE_URL
        value: https://bigsmokestyle.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://bigsmokestyle.vercel.app,https://bigsmokestyle-admin.vercel.app,http://localhost:5173,http://localhost:5174,http://localhost:3000
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ABACATEPAY_API_KEY
        sync: false
      - key: ABACATEPAY_WEBHOOK_SECRET
        sync: false
      - key: ABACATEPAY_WEBHOOK_PUBLIC_KEY
        sync: false
      - key: ABACATEPAY_BASE_URL
        value: https://api.abacatepay.com/v1
      - key: ABACATEPAY_API_URL
        value: https://api.abacatepay.com/v2
      - key: ABACATEPAY_CARD_MAX_INSTALLMENTS
        value: "6"
      - key: STORE_CITY
        value: Joao Pessoa
      - key: STORE_STATE
        value: PB
      - key: STORE_ORIGIN_CEP
        sync: false
      - key: WHATSAPP_NUMBER
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: product-images
      - key: SUPABASE_PRODUCTS_TABLE
        value: products
      - key: SUPABASE_ORDERS_TABLE
        value: orders
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: TWILIO_WHATSAPP_TO
        sync: false
      - key: TWILIO_MESSAGING_SERVICE_SID
        sync: false
      - key: TWILIO_WHATSAPP_CONTENT_SID
        sync: false
      - key: TWILIO_CUSTOMER_CONFIRMATION_ENABLED
        value: "false"
      - key: WHATSAPP_WEBHOOK_URL
        sync: false
      - key: WHATSAPP_WEBHOOK_SECRET
        sync: false
      - key: WHATSAPP_WEBHOOK_TIMEOUT_MS
        value: "8000"
